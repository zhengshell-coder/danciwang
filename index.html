<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="单词王">
<meta name="theme-color" content="#F5F5F0">
<link rel="apple-touch-icon" href="app/icon.png">

<title>单词王</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green-dark:#1B5E20;--green:#2E7D32;--green-light:#4CAF50;--green-bg:#E8F5E9;--orange:#FF6F00;--orange-light:#FFF3E0;--bg:#F5F5F0;--card:#FFFFFF;--text:#1a1a2e;--text-light:#666;--shadow:0 4px 20px rgba(0,0,0,0.08);--radius:16px;--radius-sm:10px;--sidebar-width:230px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:20px}
#app{max-width:1060px;width:100%;display:flex;gap:24px;align-items:flex-start}
#sidebar{width:var(--sidebar-width);flex-shrink:0;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;position:sticky;top:20px;max-height:calc(100vh - 40px);overflow-y:auto;display:flex;flex-direction:column}
#sidebar-logo{font-size:18px;font-weight:800;color:var(--green-dark);margin-bottom:14px;text-align:center}
#sidebar-logo span{color:var(--orange)}
.sidebar-total{text-align:center;padding:12px 0;border-bottom:2px solid var(--green-bg);margin-bottom:10px;display:flex;justify-content:space-around}
.sidebar-total .num{font-size:28px;font-weight:800;color:var(--green-dark)}
.sidebar-total .label{font-size:11px;color:var(--text-light)}
.sidebar-progress{height:5px;background:#e0e0e0;border-radius:3px;overflow:hidden;margin:6px 0 14px}
.sidebar-progress-fill{height:100%;background:linear-gradient(90deg,var(--green-light),var(--green-dark));border-radius:3px;transition:width 0.5s}
#sidebar h3{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);margin:12px 0 8px;display:flex;justify-content:space-between;align-items:center}
#sidebar h3 button{background:none;border:1px dashed #ccc;border-radius:6px;padding:2px 8px;font-size:11px;cursor:pointer;color:var(--text-light)}
#sidebar h3 button:hover{background:var(--green-bg);border-color:var(--green-light);color:var(--green)}
.scenario-list{list-style:none;display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto}
.scenario-list li{display:flex;justify-content:space-between;align-items:center;padding:7px 8px;border-radius:8px;cursor:pointer;transition:all 0.2s;font-size:13px}
.scenario-list li:hover{background:var(--green-bg)}
.scenario-list li.active{background:var(--green-bg);font-weight:700;color:var(--green-dark);border:1px solid var(--green-light)}
.scenario-list .sc-name{display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px}
.scenario-list .sc-progress{font-size:11px;color:var(--text-light)}
#sidebar-cats-section{display:none}
#sidebar-cats-section.visible{display:block}
#sidebar-cats-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);margin:10px 0 6px;display:flex;justify-content:space-between}
.sidebar-cats{list-style:none;display:flex;flex-direction:column;gap:2px}
.sidebar-cats li{display:flex;justify-content:space-between;font-size:11px;padding:3px 6px;border-radius:6px;cursor:pointer}
.sidebar-cats li:hover{background:var(--green-bg)}
.sidebar-cats li.active{background:var(--green-bg);font-weight:600;color:var(--green-dark)}
#main{flex:1;min-width:0}
.scenario-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.scenario-header h1{font-size:22px;font-weight:800;color:var(--green-dark);display:flex;align-items:center;gap:8px}
.scenario-header h1 span.emoji-big{font-size:28px}
.scenario-header h1 small{font-size:13px;font-weight:400;color:var(--text-light)}
.category-nav{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.category-btn{padding:6px 12px;border:2px solid #e0e0e0;background:var(--card);border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-light)}
.category-btn:hover{border-color:var(--green-light);color:var(--green)}
.category-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
.category-btn .badge{display:inline-block;background:#e0e0e0;border-radius:10px;padding:0 6px;font-size:11px;margin-left:4px;color:var(--text-light)}
.category-btn.active .badge{background:rgba(255,255,255,0.25);color:#fff}
.mode-selector{display:flex;gap:8px;margin-bottom:12px;justify-content:center}
.mode-btn{padding:6px 14px;border:2px solid var(--green);background:transparent;color:var(--green);border-radius:20px;cursor:pointer;font-size:12px;font-weight:600}
.mode-btn.active{background:var(--green);color:#fff}
.mode-btn:hover:not(.active){background:var(--green-bg)}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;justify-content:center;position:sticky;top:0;z-index:10;background:var(--bg);padding:6px 0}

.level-btn{padding:4px 14px;border:1px solid #e0e0e0;background:var(--card);border-radius:12px;cursor:pointer;font-size:12px;color:var(--text-light)}
.level-btn.active{background:var(--green-bg);border-color:var(--orange);color:var(--orange);font-weight:600}
.filter-btn{padding:4px 12px;border:1px solid #e0e0e0;background:var(--card);border-radius:12px;cursor:pointer;font-size:12px;color:var(--text-light)}
.filter-btn.active{background:var(--green-bg);border-color:var(--green-light);color:var(--green);font-weight:600}
.btn-pronounce{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border:none;background:var(--green-bg);border-radius:50%;cursor:pointer;font-size:18px;transition:all 0.2s;margin-left:8px;vertical-align:middle;line-height:1;border:1px solid transparent}
.btn-pronounce:hover{background:var(--green-light);color:#fff;border-color:var(--green);transform:scale(1.1)}
.btn-pronounce.small{width:24px;height:24px;font-size:12px;margin-left:4px}
.flashcard-wrap{display:flex;flex-direction:column;align-items:center}
.card{width:100%;max-width:480px;min-height:260px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 28px;cursor:pointer;transition:transform 0.3s;position:relative;overflow:hidden;user-select:none}
.card:hover{transform:translateY(-2px)}
.card .emoji{font-size:72px;margin-bottom:6px;line-height:1}
.card .term-en{font-size:34px;font-weight:800;color:var(--green-dark)}
.card .term-phonetic{font-size:15px;color:var(--text-light);margin-top:4px;font-family:serif}
.card .term-hint{font-size:26px;letter-spacing:3px;margin:4px 0 8px;text-align:center}
.card .details{display:none;text-align:center;width:100%}
.card.flipped .card-front{display:none}
.card.flipped .details{display:block;animation:fadeIn 0.3s}
.card .details .term-zh{font-size:26px;font-weight:700;color:var(--orange);margin-bottom:6px}
.card .details .term-def{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:4px}
.card .details .term-example{margin-top:6px;font-size:13px;color:var(--text-light);font-style:italic;padding:8px 14px;background:#f9f9f9;border-radius:var(--radius-sm);border-left:3px solid var(--green-light)}
.card .details .term-hint{font-size:28px;letter-spacing:4px;margin:6px 0 8px;text-align:center}
.card-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.btn-action{padding:9px 22px;border:none;border-radius:25px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-know{background:var(--green);color:#fff}
.btn-skip{background:#e0e0e0;color:var(--text)}
.btn-dontknow{background:#ffebee;color:#c62828}
.card-counter{font-size:13px;color:var(--text-light);margin-top:14px}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.flip-card{background:var(--card);border:2px solid #e8e8e8;border-radius:var(--radius-sm);padding:10px 8px;text-align:center;transition:all 0.2s;cursor:pointer;min-height:185px;display:flex;flex-direction:column}
.flip-card:hover{border-color:var(--green-light);transform:translateY(-2px)}
.flip-card .flip-back{display:none}
.flip-card.flipped .flip-front{display:none}
.flip-card.flipped .flip-back{display:block;animation:fadeIn 0.3s}
.flip-card .emoji{font-size:24px;margin-bottom:4px}
.flip-card .term-en{font-size:13px;font-weight:700;color:var(--green-dark);word-break:break-word}
.flip-card .term-phonetic{font-size:10px;color:var(--text-light);margin-top:2px;font-family:serif}
.flip-card .term-zh{font-size:14px;font-weight:700;color:var(--orange);margin-bottom:3px}
.flip-card .term-def{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:3px}
.flip-card .term-example{font-size:10px;color:var(--text-light);font-style:italic;padding:3px 6px;background:#f9f9f9;border-radius:6px;border-left:2px solid var(--green-light)}
.flip-actions{display:flex;gap:3px;justify-content:center;margin-top:auto;padding-top:8px}
.flip-btn{padding:3px 8px;border:none;border-radius:10px;font-size:10px;font-weight:600;cursor:pointer}
.flip-know{background:var(--green-bg);color:var(--green-dark)}
.flip-skip{background:#e0e0e0;color:var(--text)}
.flip-dontknow{background:#fff0f0;color:#c62828}
.flip-card.processed{opacity:0.4;pointer-events:none;transform:scale(0.97)}
.batch-next-bar{text-align:center;margin-top:6px}
.batch-next-btn{padding:10px 36px;background:var(--green);color:#fff;border:none;border-radius:25px;font-size:14px;font-weight:600;cursor:pointer}
.batch-next-btn:disabled{background:#ccc;cursor:default}
.matching-wrap-inner{display:flex;gap:16px;justify-content:center;width:100%}
.match-col{flex:1;display:flex;flex-direction:column;gap:8px;max-width:260px}
.match-col-title{font-size:12px;font-weight:700;text-transform:uppercase;color:var(--text-light);text-align:center;margin-bottom:4px}
.match-item{padding:10px 14px;background:var(--card);border:2px solid #e0e0e0;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;text-align:center}
.match-item:hover{border-color:var(--green-light)}
.match-item.selected{border-color:var(--orange);background:var(--orange-light)}
.match-item.matched{border-color:var(--green);background:var(--green-bg);cursor:default;opacity:0.7}
.match-item.wrong{animation:shake 0.4s;border-color:#ef5350;background:#ffebee}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.match-complete{text-align:center;font-size:16px;font-weight:700;color:var(--green);margin-top:16px}
.quiz-wrap{max-width:480px;margin:0 auto;width:100%}
.quiz-question{text-align:center;margin-bottom:16px}
.quiz-question .emoji{font-size:36px}
.quiz-question .q-term{font-size:24px;font-weight:800;color:var(--green-dark);margin-top:6px}
.quiz-question .q-label{font-size:13px;color:var(--text-light);margin-top:4px}
.quiz-input-area{display:flex;gap:10px;justify-content:center;align-items:center;margin:16px 0 8px}
#quiz-input{flex:1;max-width:280px;padding:12px 16px;border:2px solid #e0e0e0;border-radius:var(--radius-sm);font-size:16px;text-align:center;outline:none;transition:border-color .2s}
#quiz-input:focus{border-color:var(--green-light)}
#quiz-input.correct{border-color:var(--green);background:var(--green-bg)}
#quiz-input.wrong{border-color:#ef5350;background:#ffebee}
.quiz-submit-btn{padding:12px 24px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer}
.quiz-submit-btn:hover{opacity:.9}
.quiz-feedback{text-align:center;font-size:13px;margin:4px 0 8px;min-height:20px}
.quiz-feedback.correct{color:var(--green);font-weight:600}
.quiz-feedback.wrong{color:#ef5350;font-weight:600}
.quiz-next{display:block;margin:14px auto 0;padding:9px 28px;background:var(--green);color:#fff;border:none;border-radius:25px;font-size:13px;font-weight:600;cursor:pointer}
.content{display:block}
.content.hidden{display:none}
@media(max-width:768px){
  #app{flex-direction:column;max-width:800px}
  #sidebar{width:100%;position:static;max-height:none;display:flex;flex-wrap:wrap;gap:6px;padding:12px}
  #sidebar-logo{display:none}
  .sidebar-total{padding:0 12px 0 0;border-bottom:none;margin-bottom:0;display:flex;align-items:center;gap:6px;border-right:1px solid #eee}
  .sidebar-total .num{font-size:18px}
  .sidebar-progress{width:60px;margin:0}
  .scenario-list{flex:1;display:flex;flex-direction:row;flex-wrap:wrap}
  .scenario-list li{padding:3px 6px;font-size:11px}
  .scenario-list .sc-progress{display:none}
  #sidebar-cats-section{display:none!important}
}
@media(max-width:600px){
  body{padding:10px}
  .card .term-en{font-size:26px}
  .card .emoji{font-size:36px}
  .card-grid{grid-template-columns:repeat(2,1fr)}
}
/* ---- Stability: toast, error overlay, backup ---- */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:600;background:#323232;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.25);opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.error-overlay{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center}
.error-overlay.hidden{display:none}
.error-box{background:var(--card);border-radius:var(--radius);padding:32px;max-width:460px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.error-box h2{color:#ef5350;margin:0 0 8px}
.error-box p{font-size:13px;color:var(--text);margin:0 0 16px;word-break:break-all}
.error-box button{padding:8px 24px;border:none;border-radius:20px;background:var(--green);color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin:0 4px}
.error-box .btn-reset{background:#ef5350}
.backup-bar{margin-top:auto;padding:10px;border-top:1px solid #eee;display:flex;gap:6px;flex-wrap:wrap}
.backup-btn{flex:1;padding:6px 10px;border:1px solid #d0d0d0;background:var(--card);border-radius:8px;cursor:pointer;font-size:11px;text-align:center;color:var(--text-light)}
.backup-btn:hover{border-color:var(--green-light);color:var(--green)}
</style>
</head>
<body>
<div id="app">
<div id="sidebar">
  <div id="sidebar-logo"><span>🌍</span> 单词王</div>
  <div class="sidebar-total">
    <div><div class="num" id="sidebar-known">0</div><div class="label">已掌握</div></div>
    <div><div class="num" id="sidebar-total" style="font-size:22px;color:var(--text-light)">0</div><div class="label">总计</div></div>
  </div>
  <div class="sidebar-progress"><div class="sidebar-progress-fill" id="sidebar-progress-fill" style="width:0%"></div></div>
  <div style="text-align:center;font-size:11px;color:var(--text-light);margin-bottom:2px" id="sidebar-pct">0%</div>
  <h3>📚 场景</h3>
  <ul class="scenario-list" id="scenario-list"></ul>
  <div id="sidebar-cats-section">
    <div id="sidebar-cats-title">📂 分类</div>
    <ul class="sidebar-cats" id="sidebar-cats"></ul>
  </div>
  <div class="backup-bar">
    <button class="backup-btn" onclick="exportBackup()">💾 备份进度</button>
    <button class="backup-btn" onclick="document.getElementById('backup-file-input').click()">📂 恢复进度</button>
    <input type="file" id="backup-file-input" accept=".json" style="display:none" onchange="importBackup(this)">
  </div>
</div>
<div id="main">
<div class="scenario-header" id="scenario-header">
  <h1 id="scenario-title"><span class="emoji-big">🎾</span> 网球 <small>Tennis</small></h1>
</div>
<nav class="category-nav" id="category-nav"></nav>
<div class="mode-selector">
  <button class="mode-btn active" data-mode="flashcard">📇 单词卡</button>
  <button class="mode-btn" data-mode="matching">🔗 连线匹配</button>
  <button class="mode-btn" data-mode="quiz">📝 拼写测验</button>
</div>
<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="known">已掌握 ✓</button>
  <button class="filter-btn" data-filter="unknown">待复习</button>
<div class="level-bar" style="display:flex;gap:8px;margin-bottom:12px;justify-content:center;padding:4px 0">
  <button class="level-btn active" data-level="all">全部等级</button>
  <button class="level-btn" data-level="b">初级</button>
  <button class="level-btn" data-level="i">中级</button>
  <button class="level-btn" data-level="a">高级</button>
</div>
</div>
<div class="content" id="flashcard-mode"><div class="flashcard-wrap"></div></div>
<div class="content hidden" id="matching-mode"><div id="matching-wrap"></div></div>
<div class="content hidden" id="quiz-mode">
  <div class="quiz-wrap">
    <div class="quiz-score" id="quiz-score">得分: 0 / 0</div>
    <div class="quiz-question">
      <div class="emoji" id="quiz-emoji">🎯</div>
      <div class="q-term" id="quiz-term"></div>
      <div class="q-label">请输入对应的英文：</div>
    </div>
     <div class="quiz-input-area" id="quiz-input-area">
      <input type="text" id="quiz-input" placeholder="输入对应英文单词…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="quiz-submit-btn" id="quiz-submit">确认</button>
    </div>
    <div class="quiz-feedback hidden" id="quiz-feedback"></div>
    <button class="quiz-next hidden" id="quiz-next">下一题 →</button>
  </div>
</div>
<div class="content hidden" id="history-mode"><div id="history-content"></div></div>
<div class="content hidden" id="court-mode"><div id="court-content"></div></div>
</div>
</div>
<div id="toast" class="toast"></div>
<div id="error-overlay" class="error-overlay hidden">
  <div class="error-box">
    <h2>⚠️ 出错了</h2>
    <p id="error-msg"></p>
    <button onclick="location.reload()">🔄 刷新页面</button>
    <button class="btn-reset" onclick="resetAllData()">🗑️ 重置所有数据</button>
  </div>
</div>
<script>
// ============================================================
// PRONUNCIATION (FIX 1: better voice quality)
// ============================================================
function speak(text) {
  if (!window.speechSynthesis) { alert("Your browser does not support speech synthesis."); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US"; u.rate = 0.8; u.pitch = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(function(v){ return v.name.includes('Samantha') || v.name.includes('Google US') || v.name.includes('Alex') || v.name.includes('Daniel'); });
  if (preferred) u.voice = preferred;
  window.speechSynthesis.speak(u);
}
// Pre-load voices
window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = function(){ window.speechSynthesis.getVoices(); };

// ============================================================
// VOCABULARY DATA
// ============================================================
const TENNIS_CATEGORIES = [
  {id:'shots',name:'击球技术',emoji:'🏓',terms:[
      {en:'Tennis Elbow',phonetic:'/tenniselbow/',zh:'网球肘',def:'A term in 击球技术.',example:'Learn tennis elbow.',emoji:'🎾',level:'b'},
      {en:'Wrist Snap',phonetic:'/wristsnap/',zh:'手腕发力',def:'A term in 击球技术.',example:'Learn wrist snap.',emoji:'🎾',level:'i'},
      {en:'Inside-Out',phonetic:'/inside-out/',zh:'反拍侧身',def:'A term in 击球技术.',example:'Learn inside-out.',emoji:'🎾',level:'a',hint:'🔄➡️'},
      {en:'Inside-In',phonetic:'/inside-in/',zh:'正拍正手',def:'A term in 击球技术.',example:'Learn inside-in.',emoji:'🎾',level:'a'},
      {en:'All-Court',phonetic:'/all-court/',zh:'全场型',def:'A term in 击球技术.',example:'Learn all-court.',emoji:'🎾',level:'i'},
      {en:'Baseliner',phonetic:'/baseliner/',zh:'底线型',def:'A term in 击球技术.',example:'Learn baseliner.',emoji:'☯️',level:'i'},
      {en:'Serve-and-Volley',phonetic:'/serve-and-volley/',zh:'发球上网型',def:'A term in 击球技术.',example:'Learn serve-and-volley.',emoji:'🏐',level:'i'},
      {en:'Counterpuncher',phonetic:'/counterpuncher/',zh:'防守反击型',def:'A term in 击球技术.',example:'Learn counterpuncher.',emoji:'🎾',level:'i'},

// ============================================================
// STABILITY: error handling, backup, integrity
// ============================================================
function showToast(msg) {
  var el = document.getElementById("toast");
  if (!el) return;
  el.textContent = msg; el.classList.add("show");
  if (window._toastTimer) clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function(){el.classList.remove("show");}, 2000);
}
function showError(msg) {
  var overlay = document.getElementById("error-overlay");
  var msgEl = document.getElementById("error-msg");
  if (overlay && msgEl) { msgEl.textContent = msg; overlay.classList.remove("hidden"); }
}
function hideError() { var el = document.getElementById("error-overlay"); if (el) el.classList.add("hidden"); }
function resetAllData() {
  if (!confirm("确定要重置所有数据吗？这将清除所有学习进度。")) return;
  localStorage.clear(); showToast("✅ 数据已重置"); setTimeout(function(){location.reload();}, 500);
}
function exportBackup() {
  try {
    var data = {};
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      data[k] = localStorage.getItem(k);
    }
    data._exportedAt = new Date().toISOString();
    data._version = "1.0";
    var blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "scenewords-backup-" + new Date().toISOString().slice(0,10) + ".json";
    a.click(); showToast("✅ 进度已备份");
  } catch(e) { showError("备份失败: " + e.message); }
}
function importBackup(input) {
  try {
    var file = input.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = JSON.parse(e.target.result);
        var count = 0;
        for (var key in data) {
          if (key === "_exportedAt" || key === "_version") continue;
          localStorage.setItem(key, data[key]);
          count++;
        }
        showToast("✅ 已恢复 " + count + " 项数据");
        input.value = "";
        setTimeout(function(){location.reload();}, 800);
      } catch(err) { showError("文件格式错误: " + err.message); }
    };
    reader.readAsText(file);
  } catch(e) { showError("读取文件失败: " + e.message); }
}
// Safe wrapper – catches errors and shows the error overlay
function safeRun(fn) {
  return function() {
    try { return fn.apply(this, arguments); }
    catch(e) { showError(e.message + " (at " + e.stack.split("\n")[1]?.trim() + ")"); }
  };
}
function initDataIntegrity() {
  for (var k in DEFAULT_SCENARIOS) {
    var s = scenarios[k];
    if (!s || typeof s !== "object") continue;
    if (!Array.isArray(s.categories)) {
      s.categories = JSON.parse(JSON.stringify(DEFAULT_SCENARIOS[k].categories));
      showToast("已修复 " + (s.name || k) + " 的数据");
    } else {
      for (var ci = 0; ci < s.categories.length; ci++) {
        var c = s.categories[ci];
        if (!c || !Array.isArray(c.terms)) {
          var def = DEFAULT_SCENARIOS[k].categories[ci];
          if (def) { s.categories[ci] = JSON.parse(JSON.stringify(def)); showToast("已修复丢失的分类"); }
        }
      }
    }
  }
}

function init() {
  try {
    scenarios = loadScenarios();
    initDataIntegrity();
    state.known = loadKnown(state.currentScenario);
    renderAll();
  } catch(e) { showError("启动失败: " + e.message); }
}
function scKey(id) { return "scene_known_" + id; }
function scDataKey() { return "scene_data_v2"; }

function loadScenarios() {
  let s = {};
  try { const raw = localStorage.getItem(scDataKey()); if (raw) s = JSON.parse(raw); } catch(e) {}
  for (const k in DEFAULT_SCENARIOS) {
    if (!s[k]) { s[k] = JSON.parse(JSON.stringify(DEFAULT_SCENARIOS[k])); }
    else if (s[k].builtin) { s[k].categories = JSON.parse(JSON.stringify(DEFAULT_SCENARIOS[k].categories)); }
  }
  return s;
}
function saveScenarios() { localStorage.setItem(scDataKey(), JSON.stringify(scenarios)); }
function loadKnown(scId) { try { return JSON.parse(localStorage.getItem(scKey(scId)) || "[]"); } catch(e) { return []; } }
function saveKnown() { localStorage.setItem(scKey(state.currentScenario), JSON.stringify(state.known)); }

function getCurrentScenario() { return scenarios[state.currentScenario]; }
function getCurrentCategories() { const sc = getCurrentScenario(); return sc ? sc.categories : []; }
function getCurrentCategory() { const cats = getCurrentCategories(); return cats[state.currentCategory] || null; }

// FIX 2: "全部" filter excludes known words
function getCurrentTerms() {
  const cat = getCurrentCategory();
  if (!cat || !cat.terms) return [];
  let terms = cat.terms;
  if (state.filter === "known") terms = terms.filter(t => state.known.includes(t.en));
  else if (state.filter === "unknown" || state.filter === "all") terms = terms.filter(t => !state.known.includes(t.en));
  if (state.level !== "all") terms = terms.filter(t => t.level === state.level);
  return terms;
}

function getGlobalProgress() {
  let total = 0, known = 0;
  for (const id in scenarios) {
    const sc = scenarios[id], k = loadKnown(id);
    if (sc.categories) sc.categories.forEach(c => { if (c.terms) { total += c.terms.length; c.terms.forEach(t => { if (k.includes(t.en)) known++; }); } });
  }
  return { total, known };
}

function renderAll() {
  try {
    const sc = getCurrentScenario();
    if (!sc) { const keys = Object.keys(scenarios); state.currentScenario = keys.length ? keys[0] : "tennis"; }
    state.known = loadKnown(state.currentScenario);
    renderSidebar(); renderCategories(); renderScenarioHeader();
    document.querySelectorAll(".content").forEach(c => c.classList.add("hidden"));
    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
    var ms = document.querySelector(".mode-selector"); if (ms) ms.style.display = "flex";
    var fb = document.getElementById("filter-bar"); if (fb) fb.style.display = "flex";
    if (state.currentMode === "flashcard") {
      var fm = document.getElementById("flashcard-mode"); if (fm) fm.classList.remove("hidden");
      var mb = document.querySelector(".mode-btn[data-mode=\"flashcard\"]"); if (mb) mb.classList.add("active");
      renderFlashcard();
    } else if (state.currentMode === "matching") {
      var mm = document.getElementById("matching-mode"); if (mm) mm.classList.remove("hidden");
      var mb2 = document.querySelector(".mode-btn[data-mode=\"matching\"]"); if (mb2) mb2.classList.add("active");
      renderMatching();
    } else if (state.currentMode === "quiz") {
      var qm = document.getElementById("quiz-mode"); if (qm) qm.classList.remove("hidden");
      var mb3 = document.querySelector(".mode-btn[data-mode=\"quiz\"]"); if (mb3) mb3.classList.add("active");
      renderQuiz();
    }
  } catch(e) { showError("渲染出错: " + e.message + " (at " + (e.stack && e.stack.split("\n")[1] ? e.stack.split("\n")[1].trim() : "") + ")"); }
}

function renderScenarioHeader() {
  const sc = getCurrentScenario();
  document.getElementById("scenario-title").innerHTML = "<span class=\"emoji-big\">" + sc.emoji + "</span> " + sc.name + " <small>" + (sc.enName || "") + "</small>";
}

function renderSidebar() {
  var total, known, pct;
  var gp = getGlobalProgress();
  total = gp.total; known = gp.known;
  pct = total ? Math.round(known / total * 100) : 0;
  document.getElementById("sidebar-known").textContent = known;
  document.getElementById("sidebar-total").textContent = total;
  document.getElementById("sidebar-progress-fill").style.width = pct + "%";
  document.getElementById("sidebar-pct").textContent = pct + "%";
  var list = document.getElementById("scenario-list");
  var html = "";
  var keys = Object.keys(scenarios);
  for (var si = 0; si < keys.length; si++) {
    var id = keys[si], s = scenarios[id], k = loadKnown(id);
    var scTotal = 0, scKnown = 0;
    if (s.categories) {
      for (var ci = 0; ci < s.categories.length; ci++) {
        var c = s.categories[ci];
        if (c.terms) {
          scTotal += c.terms.length;
          for (var ti = 0; ti < c.terms.length; ti++) {
            if (k.indexOf(c.terms[ti].en) !== -1) scKnown++;
          }
        }
      }
    }
    var isActive = (id === state.currentScenario);
    html += "<li class=\"" + (isActive ? "active" : "") + "\" data-sc=\"" + id + "\">" +
      "<span class=\"sc-name\">" + s.emoji + " " + s.name + "</span>" +
      "<span class=\"sc-progress\">" + scKnown + "/" + scTotal + "</span></li>";
  }
  list.innerHTML = html;
  var items = list.querySelectorAll("li[data-sc]");
  for (var i = 0; i < items.length; i++) {
    items[i].addEventListener("click", function(e) {
      var id = this.dataset.sc;
      if (id !== state.currentScenario) {
        state.currentScenario = id; state.currentCategory = 0;
        state.flashcardIndex = 0; state.batchIndex = 0;
        state.known = loadKnown(id);
        renderAll();
      }
    });
  }
  // FIX 3: sidebar cats always show if categories exist
  var catsSection = document.getElementById("sidebar-cats-section");
  var sc = getCurrentScenario();
  if (sc && sc.categories && sc.categories.length > 0) {
    catsSection.classList.add("visible");
    var catList = document.getElementById("sidebar-cats");
    var catHtml = "";
    for (var ci = 0; ci < sc.categories.length; ci++) {
      var c = sc.categories[ci];
      var kc = 0;
      if (c.terms) {
        for (var ti = 0; ti < c.terms.length; ti++) {
          if (state.known.indexOf(c.terms[ti].en) !== -1) kc++;
        }
      }
      var ct = c.terms ? c.terms.length : 0;
      catHtml += "<li class=\"" + (ci === state.currentCategory ? "active" : "") + "\" data-cat-index=\"" + ci + "\">" +
        "<span class=\"cat-name\">" + c.emoji + " " + c.name + "</span>" +
        "<span class=\"cat-stat\">" + kc + "/" + ct + "</span></li>";
    }
    catList.innerHTML = catHtml;
    var catItems = catList.querySelectorAll("li[data-cat-index]");
    for (var i = 0; i < catItems.length; i++) {
      catItems[i].addEventListener("click", function() {
        state.currentCategory = parseInt(this.dataset.catIndex);
        state.flashcardIndex = 0; state.batchIndex = 0;
        renderAll();
      });
    }
  } else {
    catsSection.classList.remove("visible");
  }
}

function renderCategories() {
  var sc = getCurrentScenario();
  var nav = document.getElementById("category-nav");
  if (!sc || !sc.categories) { nav.innerHTML = ""; return; }
  var html = "";
  for (var i = 0; i < sc.categories.length; i++) {
    var c = sc.categories[i];
    var badge = c.terms ? "<span class=\"badge\">" + c.terms.filter(function(t){return state.known.indexOf(t.en)!==-1}).length + "/" + c.terms.length + "</span>" : "";
    html += "<button class=\"category-btn" + (i === state.currentCategory ? " active" : "") + "\" data-index=\"" + i + "\">" + c.emoji + " " + c.name + " " + badge + "</button>";
  }
  nav.innerHTML = html;
  var btns = nav.querySelectorAll(".category-btn");
  for (var i = 0; i < btns.length; i++) {
    btns[i].addEventListener("click", function() {
      state.currentCategory = parseInt(this.dataset.index);
      state.flashcardIndex = 0; state.batchIndex = 0;
      renderAll();
    });
  }
}

function renderFlashcard() {
  var allTerms = getCurrentTerms();
  var wrap = document.querySelector(".flashcard-wrap");
  if (allTerms.length === 0) {
    wrap.innerHTML = "<div style=\"text-align:center;padding:40px\"><p>暂无术语</p></div>";
    return;
  }
  var BATCH = 9;
  if (state.batchIndex == null) state.batchIndex = 0;
  if (state.batchIndex >= allTerms.length) state.batchIndex = 0;
  var batch = allTerms.slice(state.batchIndex, state.batchIndex + BATCH);
  var start = state.batchIndex + 1, total = allTerms.length, end = Math.min(state.batchIndex + BATCH, total);
  var html = "<div style=\"margin-bottom:8px;font-size:13px;color:var(--text-light)\">第 " + start + "-" + end + " 个，共 " + total + " 个</div><div class=\"card-grid\">";
  for (var i = 0; i < batch.length; i++) {
    var t = batch[i];
    var safeEn = t.en.replace(/'/g, "\\'");
    html += "<div class=\"flip-card\" data-term=\"" + t.en + "\"><div class=\"flip-front\"><div class=\"emoji\">" + t.emoji + "</div>" +
      (t.hint ? "<div class=\"term-hint\">" + t.hint + "</div>" : "") +
      "<div class=\"term-en\">" + t.en + "</div>" +
      "<div class=\"term-phonetic\">" + (t.phonetic || "") + "</div>" +
      "<div style=\"margin-top:6px\"><button class=\"btn-pronounce small\" onclick=\"event.stopPropagation();speak('" + safeEn + "')\">🔊</button></div></div>" +
      "<div class=\"flip-back\"><div class=\"term-zh\">" + t.zh + "</div>" +
      "<div class=\"term-def\">" + t.def + "</div>" +
      "<div class=\"term-example\">\"" + t.example + "\"</div>" +
      "<div style=\"margin-top:6px\"><button class=\"btn-pronounce small\" onclick=\"event.stopPropagation();speak('" + safeEn + "')\">🔊</button></div></div>" +
      "<div class=\"flip-actions\"><button class=\"flip-btn flip-know\" data-action=\"know\">✓ 已掌握</button>" +
      "<button class=\"flip-btn flip-skip\" data-action=\"skip\">⏭ 跳过</button>" +
      "<button class=\"flip-btn flip-dontknow\" data-action=\"dontknow\">✗ 未记住</button></div></div>";
  }
  var batchDisabled = state.filter === "known" ? "" : "disabled";
  var batchText = state.filter === "known" ? "下一页 →" : "已处理 0/" + batch.length;
  html += "</div><div style=\"text-align:center\"><button class=\"batch-next-btn\" id=\"batch-next\" " + batchDisabled + ">" + batchText + "</button></div>";
  wrap.innerHTML = html;
  attachFlipEvents();
}

function attachFlipEvents() {
  var cards = document.querySelectorAll(".flip-card");
  for (var i = 0; i < cards.length; i++) {
    cards[i].addEventListener("click", function(e) {
      if (e.target.closest(".flip-actions") || e.target.closest(".btn-pronounce")) return;
      this.classList.toggle("flipped");
    });
  }
  var btns = document.querySelectorAll(".flip-actions .flip-btn");
  for (var i = 0; i < btns.length; i++) {
    btns[i].addEventListener("click", function(e) {
      e.stopPropagation();
      var card = this.closest(".flip-card");
      if (card.classList.contains("processed")) return;
      var termEn = card.dataset.term;
      var action = this.dataset.action;
      if (action === "dontknow") { var idx = state.known.indexOf(termEn); if (idx !== -1) state.known.splice(idx, 1); }
      // action "know" is for intermediate review only — never adds to state.known
      card.classList.add("processed", "flipped");
      saveKnown(); saveScenarios();
      renderSidebar(); renderCategories();
      var allCards = document.querySelectorAll(".flip-card");
      var processed = document.querySelectorAll(".flip-card.processed").length;
      var nextBtn = document.getElementById("batch-next");
      if (nextBtn) {
        if (processed >= allCards.length) { nextBtn.disabled = false; nextBtn.textContent = "下一页 →"; }
        else { nextBtn.textContent = "已处理 " + processed + "/" + allCards.length; }
      }
    });
  }
  var nb = document.getElementById("batch-next");
  if (nb) {
    nb.addEventListener("click", function() {
      if (this.disabled) return;
      state.batchIndex += 9;
      saveKnown();
      renderAll();
    });
  }
}

function renderMatching() {
  var wrap = document.getElementById("matching-wrap");
  var terms = getCurrentTerms();
  if (terms.length < 2) { wrap.innerHTML = "<div style=\"text-align:center;padding:40px\"><p>需要至少2个术语</p></div>"; return; }
  var shuffled = terms.slice().sort(function(){return Math.random()-0.5});
  state.matchGroups = [];
  for (var i = 0; i < shuffled.length; i += 8) state.matchGroups.push(shuffled.slice(i, i + 8));
  state.matchGroupIndex = 0;
  renderMatchGroup();
}

function renderMatchGroup() {
  var wrap = document.getElementById("matching-wrap");
  var group = state.matchGroups[state.matchGroupIndex];
  if (!group) { wrap.innerHTML = "<div class=\"match-complete\">🎉 匹配完成!</div>"; return; }
  var enList = group.map(function(t){return t.en}).sort(function(){return Math.random()-0.5});
  var zhList = group.map(function(t){return{en:t.en,zh:t.zh,emoji:t.emoji}}).sort(function(){return Math.random()-0.5});
  state.matchPairs = []; state.matchCount = 0; state.matchSelected = null;
  for (var i = 0; i < enList.length; i++) state.matchPairs.push({en:enList[i],matched:false});
  var html = "<div style=\"margin-bottom:6px;font-size:12px;color:var(--text-light)\">第 " + (state.matchGroupIndex+1) + "/" + state.matchGroups.length + " 组</div>";
  html += "<div class=\"matching-wrap-inner\"><div class=\"match-col\"><div class=\"match-col-title\">English</div>";
  for (var i = 0; i < enList.length; i++) {
    html += "<div class=\"match-item\" data-en=\"" + enList[i] + "\">" + enList[i] + "</div>";
  }
  html += "</div><div class=\"match-col\"><div class=\"match-col-title\">中文</div>";
  for (var i = 0; i < zhList.length; i++) {
    html += "<div class=\"match-item zh-item\" data-zh=\"" + zhList[i].en + "\">" + zhList[i].emoji + " " + zhList[i].zh + "</div>";
  }
  html += "</div></div><div style=\"text-align:center;margin-top:10px\">";
  if (state.matchGroups.length > 1) {
    html += "<button class=\"batch-next-btn\" onclick=\"state.matchGroupIndex++;renderMatchGroup();\">下一组 →</button>";
  }
  wrap.innerHTML = html;
  attachMatchEvents();
}

function attachMatchEvents() {
  var items = document.querySelectorAll(".match-item:not(.matched)");
  for (var i = 0; i < items.length; i++) {
    items[i].addEventListener("click", function() {
      if (this.classList.contains("matched")) return;
      if (this.classList.contains("selected")) { this.classList.remove("selected"); state.matchSelected = null; return; }
      var isEn = this.classList.contains("zh-item") ? false : true;
      if (!state.matchSelected) {
        if (!isEn) return;
        state.matchSelected = this.dataset.en;
        this.classList.add("selected");
      } else {
        if (isEn) {
          document.querySelector(".match-item.selected").classList.remove("selected");
          state.matchSelected = this.dataset.en;
          this.classList.add("selected");
          return;
        }
        var en = state.matchSelected;
        var zh = this.dataset.zh;
        var enEl = document.querySelector(".match-item[data-en=\"" + en + "\"]");
        var zhEl = this;
        if (en === zh) {
          enEl.classList.add("matched"); zhEl.classList.add("matched");
          var num = ++state.matchCount;
          enEl.innerHTML = "<span class=\"match-num\">" + num + "</span>" + en;
          zhEl.innerHTML = "<span class=\"match-num\">" + num + "</span>" + zhEl.textContent;
          state.matchSelected = null;
          var all = document.querySelectorAll(".match-item");
          var matched = document.querySelectorAll(".match-item.matched").length;
          if (matched >= all.length) {
            var wrap = document.getElementById("matching-wrap");
            var group = state.matchGroups[state.matchGroupIndex];
            if (state.matchGroupIndex + 1 >= state.matchGroups.length) {
              wrap.innerHTML = "<div class=\"match-complete\">🎉 全部完成!</div>";
            }
          }
        } else {
          enEl.classList.add("wrong"); zhEl.classList.add("wrong");
          var self = this;
          setTimeout(function(){ enEl.classList.remove("wrong"); zhEl.classList.remove("wrong"); enEl.classList.remove("selected"); }, 400);
          state.matchSelected = null;
        }
      }
    });
  }
}

function renderQuiz() {
  var terms = getCurrentTerms();
  if (terms.length < 2) {
    document.getElementById("quiz-input-area").innerHTML = "<p style=\"text-align:center\">需要至少2个术语</p>";
    document.getElementById("quiz-next").classList.add("hidden");
    return;
  }
  state.quizTerms = terms.slice().sort(function(){return Math.random()-0.5});
  state.quizTermIndex = 0; state.quizScore = 0;
  document.getElementById("quiz-next").classList.add("hidden");
  document.getElementById("quiz-feedback").classList.add("hidden");
  showQuizQuestion();
}

function showQuizQuestion() {
  if (state.quizTermIndex >= state.quizTerms.length) {
    document.getElementById("quiz-input-area").innerHTML = "<div class=\"match-complete\">🎉 测验完成! 得分: " + state.quizScore + "/" + state.quizTerms.length + "</div>";
    document.getElementById("quiz-next").classList.add("hidden");
    return;
  }
  var t = state.quizTerms[state.quizTermIndex];
  document.getElementById("quiz-emoji").textContent = t.emoji;
  document.getElementById("quiz-term").textContent = t.zh;
  document.getElementById("quiz-score").textContent = "得分: " + state.quizScore + " / " + state.quizTermIndex;
  document.getElementById("quiz-next").classList.add("hidden");
  var fb = document.getElementById("quiz-feedback");
  fb.classList.add("hidden");
  fb.textContent = "";
  var input = document.getElementById("quiz-input");
  input.value = "";
  input.className = "";
  input.disabled = false;
  input.focus();
  document.getElementById("quiz-submit").disabled = false;
}

function quizCheckAnswer() {
  var t = state.quizTerms[state.quizTermIndex];
  var input = document.getElementById("quiz-input");
  var answer = input.value.trim();
  if (!answer) return;
  input.disabled = true;
  document.getElementById("quiz-submit").disabled = true;
  var fb = document.getElementById("quiz-feedback");
  if (answer.toLowerCase() === t.en.toLowerCase()) {
    input.classList.add("correct");
    fb.textContent = "✅ 正确! " + t.en + " = " + t.zh;
    fb.className = "quiz-feedback correct";
    state.quizScore++;
    if (state.known.indexOf(t.en) === -1) state.known.push(t.en);
    saveKnown(); saveScenarios();
  } else {
    input.classList.add("wrong");
    fb.textContent = "❌ 错误! 正确答案: " + t.en;
    fb.className = "quiz-feedback wrong";
  }
  fb.classList.remove("hidden");
  document.getElementById("quiz-next").classList.remove("hidden");
}

document.getElementById("quiz-submit").addEventListener("click", quizCheckAnswer);
document.getElementById("quiz-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") { e.preventDefault(); quizCheckAnswer(); }
});
document.getElementById("quiz-next").addEventListener("click", function() {
  state.quizTermIndex++;
  showQuizQuestion();
});

// Mode switching
document.querySelectorAll(".mode-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    state.currentMode = this.dataset.mode;
    state.flashcardIndex = 0; state.batchIndex = 0;
    renderAll();
  });
});

// Filter switching
document.querySelectorAll(".filter-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active");});
    this.classList.add("active");
    state.filter = this.dataset.filter;
    state.flashcardIndex = 0; state.batchIndex = 0;
    renderAll();
  });
});

// Level filter buttons
document.querySelectorAll(".level-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".level-btn").forEach(function(b){b.classList.remove("active");});
    this.classList.add("active");
    state.level = this.dataset.level;
    state.flashcardIndex = 0; state.batchIndex = 0;
    renderAll();
  });
});

// ============================================================
// INIT
// ============================================================
window.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
